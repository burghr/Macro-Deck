    <g fill="#7A1B3D" fill-opacity="0.16">
      <rect x="196" y="204" width="180" height="180" rx="42"/>
      <rect x="422" y="204" width="180" height="180" rx="42"/>
      <rect x="648" y="204" width="180" height="180" rx="42"/>
      <rect x="196" y="430" width="180" height="180" rx="42"/>
      <rect x="422" y="430" width="180" height="180" rx="42"/>
      <rect x="648" y="430" width="180" height="180" rx="42"/>
      <rect x="196" y="656" width="180" height="180" rx="42"/>
      <rect x="422" y="656" width="180" height="180" rx="42"/>
      <rect x="648" y="656" width="180" height="180" rx="42"/>
    </g>
    <!-- keys (center key highlighted) -->
    <g fill="#FFFFFF">
      <rect x="196" y="196" width="180" height="180" rx="42" fill-opacity="0.86"/>
      <rect x="422" y="196" width="180" height="180" rx="42" fill-opacity="0.86"/>
      <rect x="648" y="196" width="180" height="180" rx="42" fill-opacity="0.86"/>
      <rect x="196" y="422" width="180" height="180" rx="42" fill-opacity="0.86"/>
      <rect x="422" y="422" width="180" height="180" rx="42" fill-opacity="1.0"/>
      <rect x="648" y="422" width="180" height="180" rx="42" fill-opacity="0.86"/>
      <rect x="196" y="648" width="180" height="180" rx="42" fill-opacity="0.86"/>
      <rect x="422" y="648" width="180" height="180" rx="42" fill-opacity="0.86"/>
      <rect x="648" y="648" width="180" height="180" rx="42" fill-opacity="0.86"/>
    </g>
